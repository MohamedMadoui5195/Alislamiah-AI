<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alislamiah AI - Sign In</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#061a3a;
    font-family:Arial;
}

.box{
    width:330px;
    padding:30px;
    background:#0b2a5b;
    border-radius:15px;
    color:white;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:0;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:0;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.login{
    background:#1e90ff;
    color:white;
}

.google{
    background:white;
    color:#333;
}

.links{
    text-align:center;
    margin:15px 0;
}

.links a{
    color:#4db8ff;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Alislamiah AI</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button class="login" id="loginBtn">
Sign In
</button>

<div class="links">
<a href="#" id="forgotPassword">Forgot Password?</a>
<br><br>
Don't have an account?
<a href="#" id="createAccount">Create Account</a>
</div>

<button class="google" id="googleBtn">
Continue with Google
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
sendPasswordResetEmail,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyBFPwbDSeMzI5eOL8DeXNZovcr47JtlZnU",
  authDomain: "alislamiah-ai.firebaseapp.com",
  projectId: "alislamiah-ai",
  storageBucket: "alislamiah-ai.firebasestorage.app",
  messagingSenderId: "956902867596",
  appId: "1:956902867596:web:0e99d136f745655535f1a9",
  measurementId: "G-MV3BQG10T2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


// Sign In

document.getElementById("loginBtn").onclick = ()=>{

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{
alert("تم تسجيل الدخول بنجاح");
window.location.href="index.html";
})

.catch((error)=>{
alert(error.message);
});

};


// Create Account

document.getElementById("createAccount").onclick = ()=>{

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{
alert("تم إنشاء الحساب بنجاح");
window.location.href="index.html";
})

.catch((error)=>{
alert(error.message);
});

};


// Forgot Password

document.getElementById("forgotPassword").onclick = ()=>{

let email=document.getElementById("email").value;

if(email===""){
alert("Enter your email first");
return;
}

sendPasswordResetEmail(auth,email)

.then(()=>{
alert("Password reset email sent");
})

.catch((error)=>{
alert(error.message);
});

};


// Google Sign In

const provider = new GoogleAuthProvider();

document.getElementById("googleBtn").onclick = ()=>{

signInWithPopup(auth,provider)

.then(()=>{
alert("تم الدخول بواسطة Google");
window.location.href="index.html";
})

.catch((error)=>{
alert(error.code);
alert(error.message);
});

};

</script>

</body>
</html>
